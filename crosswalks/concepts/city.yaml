concept: city
canonical_definition: >-
  The city, town, or municipality where a real-estate address is located. The
  governmental unit immediately above postal code in most jurisdictions; below
  state/province. Excludes neighborhood, county, and country.
aliases:
  - town
  - municipality
  - locality
