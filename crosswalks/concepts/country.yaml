      both resolve to the same ISO 3166-1 alpha-2 concept.
  redi:
    field: Country
    version: '1.0'
    confidence: exact
    source_url: https://github.com/coradata/cora/blob/main/standards/redi/current/inventory/data-fields.yaml
    notes: >-
      REDI's flat field carries the definition "The country where the
      asset is located"; semantically identical to MITS and IBPDI.
