concept: square_footage
canonical_definition: >-
  The physical area of a unit or rentable space, expressed as a numeric
  size. The companion unit-of-measurement concept (square feet, square
  metres, etc.) is mapped under ``area_unit_of_measurement``.
aliases:
  - floor_area
  - rentable_area
  - unit_size
  - area_size
maintainer: '@coradata/maintainers'
last_reviewed: '2026-06-08'
mappings:
  mits:
    field: UnitType/MaxSquareFeet
    version: '4.0'
    confidence: partial
    source_url: https://github.com/coradata/cora/blob/main/standards/mits/current/inventory/property-marketing.yaml
    notes: >-
      MITS ``UnitType`` represents a floor-plan class (one record per
      floor plan, not per physical unit). Size is expressed as the range
      ``UnitType/MinSquareFeet`` … ``UnitType/MaxSquareFeet``, with
      ``UnitType/SquareFootType`` controlling whether to display the min,
      max, or both. The crosswalk pins the upper bound (``MaxSquareFeet``)
      as the canonical single field; consumers reconstructing a single
      "size" value should consult ``SquareFootType`` and pick accordingly.
      Confidence ``partial`` reflects the range-vs-scalar shape mismatch
      and the implicit unit (square feet, as called out in
      ``area_unit_of_measurement``).
  ibpdi:
    field: null
    version: '1.0'
    confidence: not_present
    notes: >-
      IBPDI's ``AreaMeasurement`` entity carries methodology metadata
      (``Standard`` — BOMA / IPMS, ``Type``, ``Unit``, ``Accuracy``) and
      links the measurement to a building / floor / land / site / space /
      unit / rental-unit via the corresponding ``AreaMeasurement<Scope>``
      join entities, but the committed inventory does not surface a
      numeric area value on this entity. Consumers integrating IBPDI
      area data with MITS / REDI will find the methodology metadata but
      not a usable numeric size from this inventory.
  redi:
    field: Net_Rentable_Area
    version: '1.0'
    confidence: divergent
    source_url: https://github.com/coradata/cora/blob/main/standards/redi/current/inventory/data-fields.yaml
    notes: >-
      REDI ``Net_Rentable_Area`` is documented as "The total square foot
      / meter area that may be leased or rented to tenants. For
      multi-building assets, use the total net rentable area across all
      buildings" — an asset-level aggregate, not a per-unit area. Same
      grain mismatch as ``rent_amount`` / ``market_rent`` on the REDI
      side. REDI also surfaces ``Area_Size_Unit_of_Measurement`` for the
      unit (mapped under ``area_unit_of_measurement``).
