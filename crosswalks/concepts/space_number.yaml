concept: space_number
canonical_definition: >-
  An identifier for a discrete space within a building or property — a room,
  unit, parking space, storage space, or other addressable location. Often
  numeric or alphanumeric and unique within its containing aggregate.
aliases:
  - space_id
  - room_number
maintainer: '@coradata/maintainers'
last_reviewed: '2026-06-07'
mappings:
  mits:
    field: AdditionalSpace/SpaceNumber
    version: '1.0'
    confidence: exact
    source_url: https://github.com/coradata/cora/blob/main/standards/mits/current/inventory/lease-application.yaml
    notes: >-
      MITS scopes ``SpaceNumber`` to ``AdditionalSpace`` — auxiliary spaces
      tied to a lease application (parking, storage, etc.) — distinct from
      the primary unit identifier.
  ibpdi:
    field: Space/SpaceNumber
    version: '1.0'
    confidence: exact
    source_url: https://github.com/coradata/cora/blob/main/standards/ibpdi/current/inventory/digital-twin.yaml
    notes: >-
      "Number of space" on the digital-twin ``Space`` aggregate.
  redi:
    field: null
    version: '1.0'
    confidence: not_present
    notes: >-
      REDI is fund-level investment reporting; per-space identifiers are
      out of scope.
