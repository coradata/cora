    field: NameType/FirstName
    version: '4.0'
    confidence: exact
    source_url: https://github.com/coradata/cora/blob/main/standards/mits/current/inventory/property-marketing.yaml
  ibpdi:
    field: Contact/FirstName
    version: '1.0'
    confidence: exact
    source_url: https://github.com/coradata/cora/blob/main/standards/ibpdi/current/inventory/organisational-management.yaml
  redi:
    field: null
    version: '1.0'
    confidence: not_present
    notes: >-
      REDI is LP-investment-reporting flavored and tracks contacts only at the
      organization / role level (e.g., ``Contact_Email_Address``). It does not
      decompose contact names into first / last components.
