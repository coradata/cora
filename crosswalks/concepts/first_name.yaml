concept: first_name
canonical_definition: >-
  The given name (forename) of a person — the name component conventionally
  preceding the family name in Western naming order. Excludes prefixes (Mr.,
  Dr.), middle names, last names, and suffixes (Jr., III).
aliases:
  - given_name
  - forename
  - christian_name
maintainer: '@coradata/maintainers'
last_reviewed: '2026-06-01'
mappings:
