concept: serial_number
canonical_definition: >-
  A unique identifier assigned by the manufacturer (or another authoritative
  party) to a single instance of a physical piece of equipment — building
  components, devices, fixtures, or other assets that need to be tracked
  individually for maintenance, warranty, or compliance.
aliases:
  - manufacturer_serial
  - asset_serial
  - sn
maintainer: '@coradata/maintainers'
last_reviewed: '2026-06-07'
mappings:
  mits:
    field: Device/SerialNumber
    version: '1.0'
    confidence: exact
    source_url: https://github.com/coradata/cora/blob/main/standards/mits/current/inventory/lease-application.yaml
    notes: >-
      MITS surfaces ``SerialNumber`` in two contexts: lease-application
      ``Device`` (e.g., access fobs, smart-home devices issued to a
      resident) and accounts-payable ``InvoiceDetailType``. The crosswalk
      targets the Device path as the canonical equipment-identifier
      modeling; both resolve to the same concept.
  ibpdi:
    field: Component/SerialNumber
    version: '1.0'
    confidence: exact
    source_url: https://github.com/coradata/cora/blob/main/standards/ibpdi/current/inventory/digital-twin.yaml
    notes: >-
      IBPDI's digital-twin model exposes ``SerialNumber`` on both
      ``Component`` and ``System``; the canonical-aligned path is
      ``Component/SerialNumber``.
  redi:
    field: null
    version: '1.0'
    confidence: not_present
    notes: >-
      REDI is fund-level investment reporting; individual-equipment
      identification is out of scope.
