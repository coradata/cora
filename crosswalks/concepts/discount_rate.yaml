concept: discount_rate
canonical_definition: >-
  The rate used to discount future cash flows to a present value during
  valuation — the cost of capital or required rate of return applied to an
  asset's projected cash flow series in DCF or fair-value modeling.
  Expressed as a percentage.
aliases:
  - dcf_discount_rate
  - cost_of_capital
maintainer: '@coradata/maintainers'
last_reviewed: '2026-06-07'
