name: Extractors

on:
  pull_request:
    paths:
      - "tools/extractors/**"
      - ".github/workflows/extractors.yaml"
  push:
    branches: [main]
    paths:
      - "tools/extractors/**"
      - ".github/workflows/extractors.yaml"

defaults:
  run:
    working-directory: tools/extractors

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/extractors/pyproject.toml
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest
