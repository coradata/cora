name: Extractors

on:
  pull_request:
    paths:
      - "tools/extractors/**"
      - "standards/*/current/inventory/**"
      - ".github/workflows/extractors.yaml"
  push:
    branches: [main]
    paths:
      - "tools/extractors/**"
      - "standards/*/current/inventory/**"
      - ".github/workflows/extractors.yaml"

defaults:
  run:
    working-directory: tools/extractors

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/extractors/pyproject.toml
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Install check-jsonschema
        run: pip install check-jsonschema
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy src/cora_extractors
      - name: Pytest (with 80% coverage gate)
        run: pytest --cov=cora_extractors --cov-fail-under=80
      - name: Inventory schema metaschema check
        run: check-jsonschema --check-metaschema schema/inventory.schema.json
      - name: Inventory fixtures validate against schema
        run: check-jsonschema --schemafile schema/inventory.schema.json fixtures/inventory-with-types.yaml fixtures/inventory-flat.yaml
      - name: cora validate (inventory-schema runs on committed inventories, if any)
        working-directory: .
        run: |
          if compgen -G "standards/*/current/inventory/*.yaml" > /dev/null; then
            cd tools/extractors && python -m cora_extractors validate inventory-schema --repo-root ../..
          else
            echo "No committed inventories yet — skipping."
          fi
