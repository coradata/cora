name: Extractors

on:
  pull_request:
    paths:
      - "tools/extractors/**"
      - "standards/*/current/inventory/**"
      - "crosswalks/concepts/**"
      - "docs/generated/**"
      - "docs/concepts-analysis/**"
      - ".github/workflows/extractors.yaml"
  push:
    branches: [main]
    paths:
      - "tools/extractors/**"
      - "standards/*/current/inventory/**"
      - "crosswalks/concepts/**"
      - "docs/generated/**"
      - "docs/concepts-analysis/**"
      - ".github/workflows/extractors.yaml"

defaults:
  run:
    working-directory: tools/extractors

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/extractors/pyproject.toml
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Install check-jsonschema
        run: pip install check-jsonschema
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy src/cora_extractors
      - name: Pytest (with 80% coverage gate)
        run: pytest --cov=cora_extractors --cov-fail-under=80
      - name: Inventory schema metaschema check
        run: check-jsonschema --check-metaschema schema/inventory.schema.json
      - name: Inventory fixtures validate against schema
        run: check-jsonschema --schemafile schema/inventory.schema.json fixtures/inventory-with-types.yaml fixtures/inventory-flat.yaml
      - name: cora validate inventory-schema (against committed inventories)
        working-directory: .
        run: |
          if compgen -G "standards/*/current/inventory/*.yaml" > /dev/null; then
            cd tools/extractors && python -m cora_extractors validate inventory-schema --repo-root ../..
          else
            echo "No committed inventories yet — skipping."
          fi
      - name: cora validate field-count (against committed inventories)
        working-directory: .
        run: |
          if compgen -G "standards/*/current/inventory/*.yaml" > /dev/null; then
            cd tools/extractors && python -m cora_extractors validate field-count --repo-root ../..
          else
            echo "No committed inventories yet — skipping."
          fi
      - name: cora validate crosswalk-paths (against committed crosswalks)
        working-directory: .
        run: |
          if compgen -G "crosswalks/concepts/*.yaml" > /dev/null; then
            cd tools/extractors && python -m cora_extractors validate crosswalk-paths --repo-root ../..
          else
            echo "No committed crosswalks yet — skipping."
          fi
      - name: cora docs check (drift gate against docs/generated/)
        working-directory: .
        run: cd tools/extractors && python -m cora_extractors docs check --repo-root ../..
      - name: cora concepts check (drift gate against docs/concepts-analysis/)
        working-directory: .
        run: cd tools/extractors && python -m cora_extractors concepts check --repo-root ../..

  concepts-ml:
    runs-on: ubuntu-latest
    # Semantic-clustering pass installs sentence-transformers + torch
    # (~250 MB) and downloads the all-MiniLM-L6-v2 model on first run.
    # Kept in its own job so the main `test` job stays fast; the HF cache
    # makes repeat runs quick.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/extractors/pyproject.toml
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-v1
      - name: Install package (with concepts-ml extra)
        run: pip install -e ".[concepts-ml]"
      - name: cora concepts check --semantic (drift gate for the semantic report)
        working-directory: .
        run: cd tools/extractors && python -m cora_extractors concepts check --semantic --repo-root ../..
