name: Docs Site

on:
  pull_request:
    paths:
      - "docs/site/**"
      - "tools/extractors/pyproject.toml"
      - ".github/workflows/docs-site.yaml"
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "tools/extractors/pyproject.toml"
      - ".github/workflows/docs-site.yaml"

# Permissions required to deploy to GitHub Pages from the workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy at a time per ref.
concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Strict build (broken-link gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/extractors/pyproject.toml
      - name: Install docs deps
        run: pip install -e 'tools/extractors[docs]'
      - name: MkDocs build (--strict)
        working-directory: docs/site
        run: mkdocs build --strict

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/extractors/pyproject.toml
      - name: Install docs deps
        run: pip install -e 'tools/extractors[docs]'
      - name: MkDocs build
        working-directory: docs/site
        run: mkdocs build --strict
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/_build
      - id: deployment
        uses: actions/deploy-pages@v4
