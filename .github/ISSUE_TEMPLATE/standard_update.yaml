name: Standard update
description: An upstream standards body has released a new version of a hosted standard.
labels: ["standard-update"]
body:
  - type: input
    id: standard
    attributes:
      label: Standard
      placeholder: e.g. ibpdi, mits, redi
    validations:
      required: true
  - type: input
    id: new_version
    attributes:
      label: New version
    validations:
      required: true
  - type: input
    id: upstream_release_url
    attributes:
      label: Upstream release URL
    validations:
      required: true
  - type: textarea
    id: change_summary
    attributes:
      label: Summary of changes
      description: What changed upstream? Breaking? Additive? New concepts?
  - type: markdown
    attributes:
      value: >-
        **After re-extraction:** once the inventories and affected crosswalks
        are updated, run `cora docs build` and commit the result. This
        regenerates the coverage matrix, concept pages, and the
        [adoption briefings](https://github.com/coradata/cora/blob/main/docs/generated/adoption/README.md)
        — the `cora docs check` CI gate fails until you do. Field/confidence
        changes flow into the briefings automatically; a version-label-only
        bump produces no briefing diff.
