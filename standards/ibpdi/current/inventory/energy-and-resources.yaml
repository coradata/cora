types:
- name: Climate
  extends: CdmEntity
  abstract: false
  definition: Regional information on past and future amount of heating and cooling
    degree days (for potential climate normalisation and projection of energy demand)
  source_location: Climate.cdm.json
- name: ClimateBuilding
  extends: CdmEntity
  abstract: false
