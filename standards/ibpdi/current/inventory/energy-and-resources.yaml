- name: EmissionFactorSite
  extends: CdmEntity
  abstract: false
  definition: Linking entity between EmissionFactor and Site
  source_location: EmissionFactorSite.cdm.json
- name: GhgEmission
  extends: CdmEntity
  abstract: false
  definition: Greenhouse gas (Ghg) emissions (in CO2e) corresponding to individual
    operational measurements.
