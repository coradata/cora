  source_location: ClimateBuilding.cdm.json
- name: ClimateSite
  extends: CdmEntity
  abstract: false
  definition: Linking entity between Climate and Site
  source_location: ClimateSite.cdm.json
- name: EmissionFactor
  extends: CdmEntity
  abstract: false
  definition: Emission factors that are applied to convert energy consumption data
    into greenhouse gas emissions. The entity also includes global warming potential
    data for non-CO2 greenhouse gases in order to calculate CO2-equivalents (CO2e)
  source_location: EmissionFactor.cdm.json
- name: EmissionFactorBuilding
  extends: CdmEntity
  abstract: false
  definition: Linking entity between EmissionFactor and Building
  source_location: EmissionFactorBuilding.cdm.json
- name: EmissionFactorOperationalMeasurement
