- path: LimitsType/MaximumOccurences
  domain: LimitsType
  range: xs:integer
  is_reference: false
  cardinality: required
  definition: The maximum number of items in the class, or – if Applies To or Characteristics
    are specified – the maximum number of items of the specified item types.
  source_location: Property-Marketing-ILS-5.0.xsd:2000
- path: LimitsType/MaximumAmount
  domain: LimitsType
  range: xs:decimal
  is_reference: false
  cardinality: required
  definition: The maximum total amount of items in the class, or – if Applies To or
    Characteristics are specified – the maximum number of items of the specified item
    types.
  source_location: Property-Marketing-ILS-5.0.xsd:2006
- path: LimitsType/AppliesTo
  domain: LimitsType
  is_reference: false
  cardinality: optional
  definition: The specific item types (by Internal Code) that this maximum applies
    to. If omitted, it applies to all internal codes in the class meeting any Characteristic
    constraints.
  source_location: Property-Marketing-ILS-5.0.xsd:2012
- path: LimitsType/Characteristic
  domain: LimitsType
  range: CharacteristicsType
  is_reference: true
  cardinality: required
  definition: ''
  source_location: Property-Marketing-ILS-5.0.xsd:2029
- path: CharacteristicsType/ChargeRequirement
  domain: CharacteristicsType
  is_reference: false
  cardinality: required
  definition: Included, Mandatory, Situational, Conditional, or Optional
  source_location: Property-Marketing-ILS-5.0.xsd:2038
  enumeration:
  - Included
  - Mandatory
  - Situational
  - Optional
  - Conditional
- path: CharacteristicsType/ConditionalAppliesTo
  domain: CharacteristicsType
  is_reference: false
  cardinality: optional
  definition: If the Charge Requirement is Conditional, this specifies the internal
    code(s) of the Charge Offer Item(s) the presence of (or any one of) will trigger
    the automatic inclusion of this Charge Offer Item
  source_location: Property-Marketing-ILS-5.0.xsd:2078
- path: CharacteristicsType/RequirementDescription
  domain: CharacteristicsType
  range: xs:string
  is_reference: false
  cardinality: required
  definition: Description of the conditions under which situational or optional charges
    will be applied.
  source_location: Property-Marketing-ILS-5.0.xsd:2095
- path: CharacteristicsType/Refundability
  domain: CharacteristicsType
  is_reference: false
  cardinality: required
  definition: Determines whether this item is never refunded, expected to be refunded
    (e.g. a deposit), or possibly refunded (e.g. a hold fee).
  source_location: Property-Marketing-ILS-5.0.xsd:2101
  enumeration:
  - Non-refundable
  - Deposit
  - Refundable
- path: CharacteristicsType/RefundabilityMaxType
  domain: CharacteristicsType
  is_reference: false
  cardinality: required
  definition: Determines whether the maximum amount refundable is specified as an
    explicit amount or as a percentage of the amount paid.
  source_location: Property-Marketing-ILS-5.0.xsd:2129
  enumeration:
  - Amount
  - Percentage
- path: CharacteristicsType/RefundabilityMax
  domain: CharacteristicsType
  range: xs:decimal
  is_reference: false
  cardinality: required
  definition: The maximum monetary amount (if Refundability Max Type is amount) or
    percentage (if Refundability Max Type is percentage) of this fee that could be
    refunded. For percentages, ‘1’ = 100%.
  source_location: Property-Marketing-ILS-5.0.xsd:2151
- path: CharacteristicsType/RefundabilityDescription
  domain: CharacteristicsType
  range: xs:string
  is_reference: false
  cardinality: required
  definition: Description of the terms that apply to return of deposits or refunds.
  source_location: Property-Marketing-ILS-5.0.xsd:2157
- path: CharacteristicsType/RefundabilityPerType
  domain: CharacteristicsType
  is_reference: false
  cardinality: optional
  definition: Where a refundability maximum is specified, and this item Amount Per
    Type is either Applicant or Person, this attribute specifies whether the refundability
    max applies to each per-entity (i.e. per applicant/per person) or whether the
    max applies to the aggregate of all applicants/people.
  source_location: Property-Marketing-ILS-5.0.xsd:2163
  enumeration:
  - Item
  - Leaseholder
  - Person
  - Period
- path: CharacteristicsType/Lifecycle
  domain: CharacteristicsType
  is_reference: false
  cardinality: required
  definition: The stage in the lifecycle of the resident’s lease that this item relates
    to.
  source_location: Property-Marketing-ILS-5.0.xsd:2197
  enumeration:
  - Pre-application
  - At Application
  - Approved Future Resident
  - Move-in
  - During Term
  - Renewal
  - Move-out
  - Past Resident
  - Transfer
  - Other
- path: CharacteristicsType/PaymentFrequency
  domain: CharacteristicsType
  is_reference: false
  cardinality: required
  definition: The frequency on which the amounts specified in this item will be payable.
  source_location: Property-Marketing-ILS-5.0.xsd:2266
  enumeration:
  - One-time
  - Per-occurrence
  - Hourly
  - 24h
  - Weekly
  - Bi-weekly
  - Monthly
  - Bi-monthly
  - Quarterly
  - Triannually
  - Semi-annually
  - Annually
  - Other
- path: ChargeOfferItemType/Name
  domain: ChargeOfferItemType
  range: xs:string
  is_reference: false
  cardinality: required
  definition: Short name indicating what the charge is for, using the operator’s preferred
    customer-facing language.
  source_location: Property-Marketing-ILS-5.0.xsd:2358
- path: ChargeOfferItemType/Description
  domain: ChargeOfferItemType
  range: xs:string
  is_reference: false
  cardinality: required
  definition: Description of the charge explaining what the charge is for using the
    operator’s preferred customer-facing language, including what the resident gets
    for the charge, or why they are being charged. This can also include an explanation
    of fees that are variable (e.g. what the variability depends upon).
  source_location: Property-Marketing-ILS-5.0.xsd:2364
- path: ChargeOfferItemType/Group
  domain: ChargeOfferItemType
  range: xs:string
  is_reference: false
  cardinality: required
  definition: In some cases, and operator may have a preferred grouping of fees. When
    this is the case, this preference should be provided here using the customer-facing
    name of the group under which this fee would preferably be listed.
  source_location: Property-Marketing-ILS-5.0.xsd:2370
- path: ChargeOfferItemType/Characteristics
  domain: ChargeOfferItemType
  range: CharacteristicsType
  is_reference: true
  cardinality: required
  definition: A set of additional characteristics (or metadata) about the charge that
    can be used to make it easier for the resident to see specific charges and to
    allow pricing calculators to treat each charge appropriately.
  source_location: Property-Marketing-ILS-5.0.xsd:2376
- path: ChargeOfferItemType/ItemMinimumOccurrences
  domain: ChargeOfferItemType
  range: xs:integer
  is_reference: false
  cardinality: required
  definition: If this item is subject to a minimum, it should be specified here.
  source_location: Property-Marketing-ILS-5.0.xsd:2382
- path: ChargeOfferItemType/ItemMaximumOccurrences
  domain: ChargeOfferItemType
  range: xs:integer
  is_reference: false
  cardinality: required
  definition: If this item is subject to a maximum, it should be specified here. This
    can be used to limit items to one, or a specific number (e.g. pet dogs might be
    limited to a maximum of 2). If omitted, it is assumed that there is no limit on
    the number of individual items of this type that can be added. If class level
    limits are also specified, then the lowed of the two maximums is used.
  source_location: Property-Marketing-ILS-5.0.xsd:2387
- path: ChargeOfferItemType/AmountBasis
  domain: ChargeOfferItemType
  is_reference: false
  cardinality: required
  definition: Explicit Amount, Percentage Of, Stepped, or Within Range
  source_location: Property-Marketing-ILS-5.0.xsd:2393
