- path: ChargeOfferAmountType/Amounts
  domain: ChargeOfferAmountType
  range: xs:decimal
  is_reference: false
  cardinality: repeating
  definition: If the Amount Basis is Fixed Amount, the list contains one specific
    amount. If the Amount Basis is Within Range, the list contains two amounts, the
    first being the lowest amount in the range and the second being the highest amount
    in the range. If the Amount Basis is Stepped, the list contains the amount for
    each subsequent item – i.e. the first amount is the price for the first occurrence,
    the second amount is for the second occurrence and so on. If there is no maximum
    number of occurrences, or if the maximum is greater than the number of amounts
    in the list, the last amount will be used for subsequent occurrences. Negative
    amounts indicate credits to the customer account (e.g. concessions). Positive
    amounts indicate debits (i.e. charges).
  source_location: Property-Marketing-ILS-5.0.xsd:2817
- path: ChargeOfferAmountType/Percentage
  domain: ChargeOfferAmountType
  range: xs:decimal
  is_reference: false
  cardinality: required
  definition: If the Amount Basis is Percentage Of, the percentage. Negative percentages
    indicate credits to the customer account (e.g. concessions). Positive percentages
    indicate debits (i.e. charges).
  source_location: Property-Marketing-ILS-5.0.xsd:2829
- path: ChargeOfferAmountType/TermBasis
  domain: ChargeOfferAmountType
  is_reference: false
  cardinality: required
  definition: Whole Lease or Specific Term.
  source_location: Property-Marketing-ILS-5.0.xsd:2835
  enumeration:
  - Whole Lease
  - Specific Term
- path: ChargeOfferAmountType/StartTermEarliest
  domain: ChargeOfferAmountType
  range: xs:date
  is_reference: false
  cardinality: required
  definition: If Term Basis is Specific Term, the start date of the specific term,
    or the earliest date in a range that the Specific Term start date lies. If omitted,
    any Specific Term start date preceding the Start Term Latest qualifies for this
    offer.
  source_location: Property-Marketing-ILS-5.0.xsd:2857
- path: ChargeOfferAmountType/StartTermLatest
  domain: ChargeOfferAmountType
  range: xs:date
  is_reference: false
  cardinality: required
  definition: If Term Basis is Specific Term, the latest date in a range that the
    Specific Term start date lies. If omitted, the Specific Term can start any time
    after the given Start Term Earliest. If the same as the Start Term Earliest date,
    then that is the only Specific Term start date on which this Charge Offer Amount
    applies.
  source_location: Property-Marketing-ILS-5.0.xsd:2863
- path: ChargeOfferAmountType/Duration
  domain: ChargeOfferAmountType
  range: xs:integer
  is_reference: false
  cardinality: required
  definition: The number of periods committed to, where the duration of each period
    is specified in the corresponding Charge Offer Item’s Payment Frequency.
  source_location: Property-Marketing-ILS-5.0.xsd:2869
- path: ChargeOfferAmountType/Estimate
  domain: ChargeOfferAmountType
  range: xs:boolean
  is_reference: false
  cardinality: required
  definition: If true, this amount is an estimate, and the actual amount charged could
    therefore be different.
  source_location: Property-Marketing-ILS-5.0.xsd:2875
