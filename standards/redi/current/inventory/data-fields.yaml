  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!333
- path: SFDR_Categorization
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The fund''s SFDR categorization. See below list for valid entries:

    -Article 6

    -Article 8

    -Article 9

    -Not marketing in the EU'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!334
- path: ESG_Responsible_Investment_Strategy_Categorization
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The fund''s ESG/ responsible investment categorization. See below for
    valid ESG/ responsible investment categorization descriptions:

    - Financial Only: Funds driven solely by commercial financial return. No systematic
    exposure to impact themes

    - Thematic: Funds driven by commercial financial returns and lacking stated impact
    goals, yet core strategy falls into one or more impact themes

    - Impact Fund: Funds investing with the intention of generating positive, measurable
    social and/ or environmental outcomes alongside a commercial financial return.
    Core strategy aligns with one or more impact themes and stated impact goals are
    linked to target outcomes that will be measured with impact KPIs'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!335
- path: INREV_ESG_SDDS_Submitted_to_Investors
  range: Boolean
  is_reference: false
  cardinality: optional
  definition: Does the fund share the INREV reporting template, reflecting vehicle
    level and asset level ESG data and including the required and recommended ESG
    KPIs of the INREV Guidelines, with investors?
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!336
- path: Reporting_Quarter
  range: Date
  is_reference: false
  cardinality: optional
  definition: The three-month period ending with the associated date
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!337
- path: Fund_Total_Assets_Fund_Gross_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: Under the operating model, total assets (gross asset value) equals the
    sum of total balance sheet assets minus the JV partner's economic share of total
    assets (if the operating model includes investments that are subject to both consolidation
    and equity method accounting, separate adjustments to the denominator need to
    be made on an investment by investment basis). Under the non-operating model,
    it is the sum of total balance sheet assets plus the Fund's economic share of
    JV liabilities
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!338
- path: Fund_Net_Assets_Fund_Net_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fair value of real estate and all other assets less total liabilities.
    This is the amount reported in the GAAP fair value-based financial statements
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!339
- path: Real_Estate_Investments_Gross_Market_Value_Fair_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The sum of all real estate/ investments gross market values (fair values)
    at the fund's economic ownership share (including the gross-up for the portfolio’s
    underlying share of debt relating to equity method accounting, if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!340
- path: Real_Estate_Investments_Net_Assets_Net_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The excess of the fair value of the fund's real estate/ investments
    over the liabilities of the investments. Assets owned as joint ventures should
    be reported at the fund's economic ownership share
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!341
- path: Leverage_LTV
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total debt divided by total assets at fair value. Debt is either
    at fair value or cost, or a combination thereof (consistent with the basis that
    is used in the "fair value" financial statements taken as a whole). Total debt
    should factor in the fund's economic share of all underlying joint venture debt
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!342
- path: Net_Investment_Income_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The net investment income (after interest expense and fund expenses,
    but before management/ advisory fees and incentive/ performance fees) during the
    reporting period. Net investment income should be calculated on the accrual basis
    of accounting in accordance with the standards outlined in the Reporting Standards
    Fair Value Accounting Policy Manual
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!343
- path: Management_Advisory_Fees_Accrued_Earned_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Management/ advisory fees are typically charged by investment advisors,
    or managers, for their services regarding the management of the fund. Only enter
    the amount accrued/ earned during the reporting period ( - for accrued / + for
    credit)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!344
- path: Appreciation_Gain_Loss_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Appreciation measures the change (increase or decrease) in the fund’s
    fair value. Appreciation included in the numerator should include both realized
    and unrealized asset and debt appreciation (if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!345
- path: Debt_Appreciation_Gain_Loss_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Appreciation measures the change (increase or decrease) in the fund’s
    fair value. Debt Appreciation included in the numerator should include both realized
    and unrealized debt appreciation (if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!346
- path: Real_Estate_Appreciation_Gain_Loss_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Appreciation measures the change (increase or decrease) in the fund’s
    fair value. Real Estate Appreciation included in the numerator should include
    both realized and unrealized asset appreciation
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!347
- path: Incentive_Fees_Accrued_Earned_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Incentive (performance) fees/ promotes (carried interest) are fees charged
    by investment advisors, or managers, after a predetermined investment performance
    has been attained. Only enter the amount accrued/ earned during the reporting
    period ( - for accrued / + for credit)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!348
- path: Distributed_Income_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Distributed income is defined as the amount of investment income derived
    from operations that is 1) actually distributed to investors or 2) credited to
    investors in the case of fund dividend or income reinvestment programs that are
    elected by the investor
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!349
- path: Weighted_Average_Equity_TWR_Denominator_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Weighted average equity is calculated by adjusting the beginning of
    quarter net asset value for equity transactions (contributions and distributions)
    that occur during the quarter. Each contribution or distribution that occurs during
    the period needs to be time weighted by multiplying it by a time weighting factor
    based on the date of the transaction (i.e., beginning NAV + weighted contribution
    - weighted distribution)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!350
- path: Fund_Gross_Time-Weighted_Total_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted total return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!351
- path: Fund_Gross_Time-Weighted_Total_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted total return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!352
- path: Fund_Gross_Time-Weighted_Income_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted income return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!353
- path: Fund_Gross_Time-Weighted_Income_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted income return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!354
- path: Fund_Gross_Time-Weighted_Appreciation_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return (hard-coded input that matches the fund's internally calculated/stated
    returns in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!355
- path: Fund_Gross_Time-Weighted_Appreciation_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return (hard-coded input that matches the fund's internally calculated/stated
    returns in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!356
- path: Fund_Gross_Time-Weighted_Appreciation_Real_Estate_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return relating to the appreciation of real estate
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!357
- path: Fund_Gross_Time-Weighted_Appreciation_Debt_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return relating to the appreciation of mortgage liabilities, if any
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!358
- path: Fund_Net_Time-Weighted_Total_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted total return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!359
- path: Fund_Net_Time-Weighted_Total_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted total return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!360
- path: Fund_Net_Time-Weighted_Income_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted income return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!361
- path: Fund_Net_Time-Weighted_Income_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted income return
    (hard-coded input that matches the fund's internally calculated/stated returns
    in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!362
- path: Fund_Net_Time-Weighted_Appreciation_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted appreciation
    return (hard-coded input that matches the fund's internally calculated/stated
    returns in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!363
- path: Fund_Net_Time-Weighted_Appreciation_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted appreciation
    return (hard-coded input that matches the fund's internally calculated/stated
    returns in its published reports)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!364
- path: Going-in_Cap_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cap rate that, if applied to the estimated first-year NOI for the
    asset (based on actual occupancy, contract rents, etc.), results in the estimated
    gross market value (fair value) for the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!365
- path: Discount_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The rate used to discount all cash flows to calculate the gross market
    value (fair value) for the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!366
- path: Terminal_Cap_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cap rate that, if applied to the NOI one year after the sale of
    the asset, results in the projected resale price for the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!367
- path: Stabilized_Cap_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cap rate that if applied to a "stabilized" first year NOI results
    in an estimate of the "stabilized" market value
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!368
- path: Net_Initial_Yield
  range: Double
  is_reference: false
  cardinality: optional
  definition: The current passing rent of the asset (net of operating costs, recoverable
    and non recoverable) over the gross market value (including notional acquisition
    costs)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!369
- path: Reversionary_Potential
  range: Double
  is_reference: false
  cardinality: optional
  definition: The estimated rental value as a percentage of gross market value
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!370
- path: Fund_Percent_Leased_All_Assets
  range: Double
  is_reference: false
  cardinality: optional
  definition: The percentage of the fund's net rentable square footage/ meters that
    is under lease obligation at quarter-end. ‘Under lease obligation’ means a lease
    has been executed on the space, it does not require that the lease has begun.
    It is not relevant whether the space is occupied or unoccupied, or whether the
    tenant is or is not paying rent at the time, only if the area is leased
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!371
- path: Fund_Percent_Leased_Operating_Assets_Only
  range: Double
  is_reference: false
  cardinality: optional
  definition: The percentage of the fund's net rentable square footage/ meters that
    is under lease obligation at quarter-end for its operating portfolio only. ‘Under
    lease obligation’ means a lease has been executed on the space, it does not require
    that the lease has begun. It is not relevant whether the space is occupied or
    unoccupied, or whether the tenant is or is not paying rent at the time, only if
    the area is leased
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!372
- path: Contribution_Queue
  range: Double
  is_reference: false
  cardinality: optional
  definition: The amount of unfunded capital commitments as of the end of the reporting
    period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!373
- path: Redemption_Queue
  range: Double
  is_reference: false
  cardinality: optional
  definition: The amount of outstanding redemption requests as of the end of the reporting
    period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!374
