source_label: excel
types: []
fields:
- path: Reporting_Quarter
  range: Date
  is_reference: false
  cardinality: optional
  definition: The three-month period ending with the associated date
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!2
- path: Fund_Name
  range: String
  is_reference: false
  cardinality: optional
  definition: The name of the fund or single client account
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!3
- path: Contact_Name
  range: String
  is_reference: false
  cardinality: optional
  definition: The name of the person responsible for template submission and resolution
    of any queries (if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!4
- path: Contact_Email_Address
  range: String
  is_reference: false
  cardinality: optional
  definition: The email address associated with the listed contact
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!5
- path: Reporting_Currency
  range: List
  is_reference: false
  cardinality: optional
  definition: The reporting currency for the fund/ asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!6
- path: Number_of_Investors
  range: Integer
  is_reference: false
  cardinality: optional
  definition: The total number of limited partner entities invested in the fund
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!7
- path: Number_of_Shares_Units
  range: Integer
  is_reference: false
  cardinality: optional
  definition: The total number of shares/ units in issue (outstanding) as of the end
    of the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!8
- path: Fund_Committed_Capital
  range: Double
  is_reference: false
  cardinality: optional
  definition: Cumulative fund paid-in capital plus unfunded capital commitments
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!9
- path: Fund_Paid-in_Capital
  range: Double
  is_reference: false
  cardinality: optional
  definition: All capital drawn down including the amount recalled
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!10
- path: Fund_Unfunded_Commitments
  range: Double
  is_reference: false
  cardinality: optional
  definition: The difference between aggregate capital commitments and aggregate paid-in
    capital, increased by capital returned to investors which can be reinvested (if
    applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!11
- path: Fund_Total_Distributions
  range: Double
  is_reference: false
  cardinality: optional
  definition: The aggregate fund distributions paid to investors since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!12
- path: Total_Investments
  range: Integer
  is_reference: false
  cardinality: optional
  definition: The total number of investments made by the fund since the fund's inception
    (including both realized and unrealized investments)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!13
- path: Active_Investments
  range: Integer
  is_reference: false
  cardinality: optional
  definition: The total number of unrealized investments made by the fund as of the
    end of the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!14
- path: GRESB_Score_Management_and_Performance
  range: Double
  is_reference: false
  cardinality: optional
  definition: The GRESB score is the result of the Global Real Estate Sustainability
    Benchmark (GRESB) survey, which is expressed as a percentage of the maximum score
    (www.gresb.com)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!15
- path: Fund_Total_Assets_Fund_Gross_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: Under the operating model, total assets (gross asset value) equals the
    sum of total balance sheet assets minus the JV partner's economic share of total
    assets (if the operating model includes investments that are subject to both consolidation
    and equity method accounting, separate adjustments to the denominator need to
    be made on an investment by investment basis). Under the non-operating model,
    it is the sum of total balance sheet assets plus the Fund's economic share of
    JV liabilities
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!16
- path: Fund_Net_Assets_Fund_Net_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fair value of real estate and all other assets less total liabilities.
    This is the amount reported in the GAAP fair value-based financial statements
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!17
- path: Fund_Net_Assets_Per_Share_Unit
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund net asset value divided by the total number of shares/ units
    in issue (outstanding) as of the end of the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!18
- path: Fund_INREV_Net_Assets_Net_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund net asset value adjusted for INREV required items and fair
    value concepts
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!19
- path: Fund_Issuance_Trading_Adjusted_Net_Assets_Net_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The adjusted net asset value for issuance pricing purposes, using the
    INREV net asset value or another net asset value as a base
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!20
- path: Fund_Redemption_Trading_Adjusted_Net_Assets_Net_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The adjusted net asset value for redemption pricing purposes, using
    the INREV net asset value or another net asset value as a base
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!21
- path: Real_Estate_Investments_Gross_Market_Value_Fair_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The sum of all real estate/ investments gross market values (fair values)
    at the fund's economic ownership share (including the gross-up for the portfolio’s
    underlying share of debt relating to equity method accounting, if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!22
- path: Real_Estate_Investments_Net_Assets_Net_Asset_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The excess of the fair value of the fund's real estate/ investments
    over the liabilities of the investments. Assets owned as joint ventures should
    be reported at the fund's economic ownership share
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!23
- path: Real_Estate_Investments_Asset-level_Debt_Payable_Book_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The sum of all real estate/ investments debt book values (principal
    balance outstanding) at the fund's economic ownership share (including the gross-up
    for the portfolio’s underlying share of debt relating to equity method accounting,
    if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!24
- path: Real_Estate_Investments_Asset-level_Debt_Payable_Market_Value_Fair_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The sum of all real estate/ real assets debt market values (fair values)
    at the fund's economic ownership share (including the gross-up for the portfolio’s
    underlying share of debt relating to equity method accounting, if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!25
- path: Fund-level_Debt_Other_Financing_Facilities_Debt_Payable_Book_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The outstanding principal balance at the end of the reporting period
    across all fund-level debt facilities (e.g., subscription lines, unsecured fund
    level debt, etc.)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!26
- path: Fund-level_Debt_Other_Financing_Facilities_Debt_Payable_Market_Value_Fair_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The market value (fair value) of the outstanding principal balance at
    the end of the reporting period across all fund-level debt facilities (e.g., subscription
    lines, unsecured fund level debt, etc.)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!27
- path: Cash_Cash_Equivalents
  range: Double
  is_reference: false
  cardinality: optional
  definition: All highly liquid short-term investments purchased with a maturity of
    90 days or less are considered to be cash equivalents. This should agree to what
    is reported on your fair value financial statements
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!28
- path: Other_Assets
  range: Double
  is_reference: false
  cardinality: optional
  definition: Examples of other assets include prepaid expenses, such as taxes and
    insurance, supplies inventory, utility and escrow deposits, equipment, etc. Care
    must be exercised when evaluating other assets to ensure that they have not already
    been included in the valuation of the real estate/ investment
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!29
- path: Other_Liabilities
  range: Double
  is_reference: false
  cardinality: optional
  definition: Examples of other liabilities include investment management fees payable,
    investor distributions payable, accounts payable, accrued expenses, and any other
    liabilities such as security deposits, and unearned income. Care must be exercised
    when evaluating other liabilities to ensure they have not already been included
    in the valuation of the real estate/ investment
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!30
- path: Notional_Amount_of_Derivatives_of_Currency_Hedging
  range: Double
  is_reference: false
  cardinality: optional
  definition: Gross nominal amount of foreign currency hedging instruments in relation
    to third party portfolio debt
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!31
- path: Leverage_LTV
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total debt divided by total assets at fair value. Debt is either
    at fair value or cost, or a combination thereof. Total debt should factor in the
    fund's economic share of all underlying joint venture debt
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!32
- path: Net_Investment_Income_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The net investment income (after interest expense and fund expenses,
    but before management/ advisory fees and incentive/ performance fees) during the
    reporting period. Net investment income should be calculated on the accrual basis
    of accounting in accordance with the standards outlined in the Reporting Standards
    Fair Value Accounting Policy Manual
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!33
- path: Management_Advisory_Fees_Accrued_Earned_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Management/ advisory fees are typically charged by investment advisors,
    or managers, for their services regarding the management of the vehicle
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!34
- path: Appreciation_Gain_Loss_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Appreciation measures the change (increase or decrease) in the fund’s
    fair value. Appreciation included in the numerator should include both realized
    and unrealized asset and debt appreciation (if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!35
- path: Real_Estate_Appreciation_Gain_Loss_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Appreciation measures the change (increase or decrease) in the fund’s
    fair value. Real Estate Appreciation included in the numerator should include
    both realized and unrealized asset appreciation
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!36
- path: Debt_Appreciation_Gain_Loss_Before_Fees_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Appreciation measures the change (increase or decrease) in the fund’s
    fair value. Debt Appreciation included in the numerator should include both realized
    and unrealized debt appreciation (if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!37
- path: Incentive_Fees_Accrued_Earned_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Incentive (performance) fees/ promotes (carried interest) are fees charged
    by investment advisors, or managers, after a predetermined investment performance
    has been attained ( - for accrued / + for credit)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!38
- path: Incentive_Fees_Paid_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Incentive (performance) fees/ promotes (carried interest) are fees charged
    by investment advisors, or managers, after a predetermined investment performance
    has been attained ( + for paid / - for refund)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!39
- path: Accrued_Incentive_Fees_Allocation_-_Starting_Period_Balance
  range: Double
  is_reference: false
  cardinality: optional
  definition: Prior period ending balance for GP's expected share of any unrealized
    profits that would be paid upon realization of all remaining investments, based
    on current valuations, less any potential clawback obligation. Balance also includes
    any uncollected profits from realized investments, if applicable ( - for LP payable
    / + for clawback)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!40
- path: Accrued_Incentive_Fees_Allocation_-_Ending_Period_Balance
  range: Double
  is_reference: false
  cardinality: optional
  definition: Current period ending-balance for GP's expected share of any unrealized
    profits that would be paid upon realization of all remaining investments, based
    on current valuations, less any potential clawback obligation. Balance also includes
    any uncollected profits from realized investments, if applicable ( - for LP payable
    / + for clawback)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!41
- path: Distributed_Income_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Distributed income is defined as the amount of investment income derived
    from operations that is 1) actually distributed to investors or 2) credited to
    investors in the case of fund dividend or income reinvestment programs that are
    elected by the investor
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!42
- path: Distributed_Income_Reinvested_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total amount of distributed income credited to investors in the
    case of fund dividend or income reinvestment programs that are elected by the
    investor
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!43
- path: Tax_Expenses
  range: Double
  is_reference: false
  cardinality: optional
  definition: The income taxes incurred by the fund, including the current income
    tax charge, deferred tax charge, and other tax charges
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!44
- path: Weighted_Average_Equity_TWR_Denominator_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: Weighted average equity is calculated by adjusting the beginning of
    quarter net asset value for equity transactions (contributions and distributions)
    that occur during the quarter. Each contribution or distribution that occurs during
    the period needs to be time weighted by multiplying it by a time weighting factor
    based on the date of the transaction (i.e., beginning NAV + weighted contribution
    - weighted distribution)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!45
- path: Fund_Gross_Time-Weighted_Total_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted total return
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!46
- path: Fund_Gross_Time-Weighted_Total_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted total return
    (pre-FX)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!47
- path: Fund_Gross_Time-Weighted_Income_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted income return
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!48
- path: Fund_Gross_Time-Weighted_Income_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted income return
    (pre-FX)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!49
- path: Fund_Gross_Time-Weighted_Appreciation_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!50
- path: Fund_Gross_Time-Weighted_Appreciation_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return (pre-FX)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!51
- path: Fund_Gross_Time-Weighted_Appreciation_Real_Estate_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return relating to the appreciation of real estate
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!52
- path: Fund_Gross_Time-Weighted_Appreciation_Debt_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly gross of (before) fees time-weighted appreciation
    return relating to the appreciation of mortgage liabilities, if any
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!53
- path: Fund_Net_Time-Weighted_Total_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted total return
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!54
- path: Fund_Net_Time-Weighted_Total_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted total return
    (pre-FX)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!55
- path: Fund_Net_Time-Weighted_Income_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted income return
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!56
- path: Fund_Net_Time-Weighted_Income_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted income return
    (pre-FX)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!57
- path: Fund_Net_Time-Weighted_Appreciation_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted appreciation
    return
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!58
- path: Fund_Net_Time-Weighted_Appreciation_Return_Qtr_-_PRE-FX
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fund's quarterly net of (after) fees time-weighted appreciation
    return (pre-FX)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!59
- path: Fund_Unleveraged_Property_Level_Total_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The absolute unleveraged return of the property portfolio over a stated
    period before any vehicle-level costs are deducted
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!60
- path: Fund_Unleveraged_Property_Level_Income_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The absolute unleveraged income return of the property portfolio over
    a stated period before any vehicle-level costs are deducted
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!61
- path: Fund_Unleveraged_Property_Level_Appreciation_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The absolute unleveraged appreciation return of the property portfolio
    over a stated period before any vehicle-level costs are deducted
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!62
- path: Fund_Leveraged_Gross_IRR_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: The since inception gross internal rate of return (after deduction for
    fund costs, but before deduction of recurring, transactional, and performance-based
    investment manager fees and promotes (carried interest))
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!63
- path: Fund_Leveraged_Net_IRR_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: The since inception net internal rate of return (after deduction for
    fund costs, recurring, transactional, and performance-based investment manager
    fees and promotes (carried interest))
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!64
- path: Fund_Gross_Total_Value_to_Paid-in_Capital_Multiple_TVPI_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the sum of the total distributions (including the gross-up
    for cumulative fees which were held from prior distributions, if applicable) since
    inception and the residual value divided by the total paid in capital since inception
    (excluding cumulative fees contributed, if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!65
- path: Fund_Net_Total_Value_to_Paid-in_Capital_Multiple_TVPI_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the sum of the total distributions since inception and the
    residual value divided by the total paid in capital since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!66
- path: Fund_Paid-in_Capital_to_Committed_Capital_Multiple_PIC_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the paid-in capital divided by the cumulative paid-in capital
    plus unfunded capital commitments
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!67
- path: Fund_Cumulative_Distributions_to_Paid-in_Capital_Multiple_DPI_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the aggregate fund distributions paid to investors since inception
    divided by the paid-in capital
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!68
- path: Fund_Residual_Value_to_Paid-in_Capital_Multiple_RVPI_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the net asset value (NAV) of the fund divided by the paid-in
    capital
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!69
- path: Fund_Percent_Leased_All_Assets
  range: Double
  is_reference: false
  cardinality: optional
  definition: The percentage of the fund's net rentable square footage/ meters that
    is under lease obligation at quarter-end. ‘Under lease obligation’ means a lease
    has been executed on the space, it does not require that the lease has begun.
    It is not relevant whether the space is occupied or unoccupied, or whether the
    tenant is or is not paying rent at the time, only if the area is leased
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!70
- path: Fund_Percent_Leased_Operating_Assets_Only
  range: Double
  is_reference: false
  cardinality: optional
  definition: The percentage of the fund's net rentable square footage/ meters that
    is under lease obligation at quarter-end for its operating portfolio only. ‘Under
    lease obligation’ means a lease has been executed on the space, it does not require
    that the lease has begun. It is not relevant whether the space is occupied or
    unoccupied, or whether the tenant is or is not paying rent at the time, only if
    the area is leased
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!71
- path: Weighted_Average_Cost_of_Debt
  range: Double
  is_reference: false
  cardinality: optional
  definition: The interest rate on each external debt instrument in the vehicle weighted
    by the size of such instruments. Interest costs (including debt amortization and
    lending fees) of third party debt weighted by the nominal value of such instruments.
    This excludes shareholders' loans and lease liabilities
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!72
- path: Weighted_Average_Years_to_Maturity_of_Debt
  range: Double
  is_reference: false
  cardinality: optional
  definition: The maturity of third party debt specified in years weighted by the
    nominal value of such instruments. This excludes shareholders' loans & lease liabilities
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!73
- path: New_Commitments_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total new commitments to the fund during the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!74
- path: Cancelled_Commitments_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total cancelled commitments during the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!75
- path: Capital_Contributions_Made_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The amount of capital called or drawn down from the investor(s) in accordance
    with the fund documentation or other documents, such as a subscription agreement,
    during the reporting period
