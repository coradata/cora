  definition: The city or town where the asset is located
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!207
- path: State_Province
  range: String
  is_reference: false
  cardinality: optional
  definition: The state or province where the asset is located
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!208
- path: Zip_Postal_Code
  range: String
  is_reference: false
  cardinality: optional
  definition: The zip or postal code where the asset is located
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!209
- path: Country
  range: List
  is_reference: false
  cardinality: optional
  definition: The country where the asset is located
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!210
- path: Effective_Ownership_Share_Economic_Share
  range: Double
  is_reference: false
  cardinality: optional
  definition: The ownership of the fund's interest in a particular investment based
    on the current period hypothetical liquidation (i.e., waterfall) calculation.
    At different points in the life of the investment, the economic share may differ
    from the contract share for the investment
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!211
- path: Committed_Capital
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cumulative asset paid-in capital plus unfunded commitments from
    all owners (e.g., budgeted construction costs or capital expenditure reserves)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!212
- path: Paid-in_Capital
  range: Double
  is_reference: false
  cardinality: optional
  definition: The paid-in capital is the cumulative drawdown amount, or the aggregate
    amount of committed capital actually transferred to the asset by the fund
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!213
- path: Total_Distributions
  range: Double
  is_reference: false
  cardinality: optional
  definition: The aggregate asset distributions paid since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!214
- path: Net_Asset_Value_Unrealized_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fair value of real estate and all other assets less total liabilities.
    This is the amount reported in the GAAP fair value-based financial statements.
    Assets owned as joint ventures should be reported at the fund's economic ownership
    share
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!215
- path: Asset_Unleveraged_Property_Level_Total_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The asset level return on a time-weighted basis reflects the performance
    of an operating asset or a group of assets. It relates strictly to asset operations
    and attempts to strip out all structure-related activity, usually including advisory
    fees, use of working capital, and owner income and expenses. It should be reported
    on an unleveraged basis
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!216
- path: Asset_Unleveraged_Property_Level_Total_Return_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: The asset level return on a time-weighted basis reflects the performance
    of an operating asset or a group of assets. It relates strictly to asset operations
    and attempts to strip out all structure-related activity, usually including advisory
    fees, use of working capital, and owner income and expenses. It should be reported
    on an unleveraged basis
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!217
- path: Leveraged_Gross_IRR_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: The since inception internal rate of return for the investment before
    fund fees and costs (e.g., advisory fees, use of working capital, and/ or owner
    income and expenses)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!218
- path: Gross_Total_Value_to_Paid-in_Capital_Multiple_TVPI_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the total distributions since inception divided by the total
    paid in capital since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!219
- path: Loan_Investment_Lifecycle
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The current lifecycle stage for the loan investment. See below for
    valid loan investment lifecycle type descriptions:

    -Stabilized: Completed construction with >= 85% leased status

    -Transitional: Other than stabilized, development, or pre-development

    -Development: Beginning of site and improvement construction through completion

    -Pre-Development: In preparation of development (obtaining titles and rights)
    up to beginning of site and improvement construction

    -Realized: Loan investment has been fully realized'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!220
- path: Loan_Investment_Event_of_Default
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The current event of default status for the loan investment. In Default
    means if notice of default is given, in cure period, etc. See below list for valid
    entries:

    -Not in Default

    -In Default'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!221
- path: Loan_Investment_Loan_Type
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The type of interest rate associated with the loan. See below list
    for valid entries:

    -Fixed - No Hedging

    -Fixed - IR Swap

    -Fixed - IR Cap

    -Floating - No Hedging

    -Floating - IR Swap

    -Floating - IR Cap

    -Floating - IR Floor

    -Floating - IR Collar (Cap & Floor)'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!222
- path: Loan_Investment_Paydown
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The type of paydown for the loan investment. See below list for valid
    entries:

    -Amortization

    -Interest Only'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!223
- path: Loan_Investment_Loan_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: If fixed rate, provide the rate. If floating rate, provide the reference
    rate + margin (exclude any impact from hedging)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!224
- path: Loan_Investment_Interest_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The actual interest rate for the period (including any impact from hedging)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!225
- path: Loan_Investment_Origination_Date_Entry_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The origination date for the loan investment
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!226
- path: Loan_Investment_Maturity_Date
  range: Date
  is_reference: false
