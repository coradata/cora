    the fund offering documents, including with respect to partial/ full deferment
    or suspension options
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!329
- path: Redemption_Policy_Limitations
  range: Boolean
  is_reference: false
  cardinality: optional
  definition: Are there any limitations to using commitments currently in the contribution
