    -Pro-rata

    -Pooled'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!323
- path: Contribution_Policy_Notification_Requirements
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The number of days required for contribution requests (for issuance
