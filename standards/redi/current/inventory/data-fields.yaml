  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!231
- path: Loan_Investment_Interest_Income_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The accrual basis interest income for the quarter rather than interest
    received
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!232
- path: Loan_Investment_Debt_Service_Received_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The accrual basis interest income plus scheduled principal payments
    for the quarter
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!233
- path: First_Dollar_Risk_LTV_Attachment_Point
  range: Double
  is_reference: false
  cardinality: optional
  definition: The loan(s) senior to the loan investment at principal balance outstanding
    divided by the gross market value of the underlying asset collateral
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!234
- path: Last_Dollar_Risk_LTV_Detachment_Point
  range: Double
  is_reference: false
  cardinality: optional
  definition: The loan investment plus loan(s) senior to the loan investment at principal
    balance outstanding divided by the gross market value of the underlying asset
    collateral
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!235
- path: Projected_Leveraged_Gross_IRR_After_Realization
  range: Double
  is_reference: false
  cardinality: optional
  definition: The anticipated (after full realization) internal rate of return for
    the investment before fund fees and costs (e.g., advisory fees, use of working
    capital, and/ or owner income and expenses)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!236
- path: Projected_Gross_Total_Value_to_Paid-in_Capital_Multiple_TVPI_After_Realization
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the sum of the actual and projected total distributions since
    inception divided by the actual and projected total paid in capital since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!237
- path: Lender
  range: String
