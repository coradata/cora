  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!238
- path: Debt_Payable_Loan_Type
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The type of interest rate associated with the loan. See below list
    for valid entries:

    -Fixed - No Hedging

    -Fixed - IR Swap

    -Fixed - IR Cap

    -Floating - No Hedging

    -Floating - IR Swap

    -Floating - IR Cap

    -Floating - IR Floor

    -Floating - IR Collar (Cap & Floor)'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!239
- path: Debt_Payable_Paydown
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The type of paydown for the debt payable. See below list for valid
    entries:

    -Amortization

    -Interest Only'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!240
- path: Debt_Payable_Loan_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: If fixed rate, provide the rate. If floating rate, provide the reference
