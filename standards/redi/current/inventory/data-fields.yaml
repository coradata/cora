    buildings
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!130
- path: Net_Rentable_Area
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total square foot/ meter area that may be leased or rented to tenants
    (i.e., for which rent can be charged). For multi-building assets, use the total
    net rentable area across all buildings
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!131
- path: Number_of_Units
  range: Integer
  is_reference: false
  cardinality: optional
  definition: The number of units that may be leased or rented to tenants (i.e., for
    which rent can be charged). For multi-building assets, use the total number of
    units across all buildings
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!132
- path: Other_Area_Size_Unit_of_Measurement
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The other unit of measurement used to designate the asset''s area/
    size. See below list for valid entries:

    -Beds

    -Keys

    -Acres

    -MW

    -Homes

    -Lots

    -Pads

    -Sites

    -Spaces

    -Dock Doors'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!133
- path: Other_Area
  range: Integer
  is_reference: false
  cardinality: optional
  definition: The number associated with the other area/ size unit of measurement
    for the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!134
- path: Clear_Height
  range: Integer
  is_reference: false
  cardinality: optional
  definition: Clear height is the distance from the floor to the lowest hanging ceiling
    member or hanging objects, beams, joists, or truss work descending to the floor.
    For buildings that have more than one clear height or properties with multiple
    buildings, use the clear height for the majority of the total space.
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!135
- path: Cross_Dock
  range: Boolean
  is_reference: false
  cardinality: optional
  definition: Defined as a balanced number of existing dock doors on opposite sides
    of the building. For properties with multiple buildings, mark Yes if the majority
    of the space is cross-dock. Unless the property undergoes significant capital
    expenditures to convert it, the building will not change from Yes to No as the
    building is re-tenanted. For properties submitted with multiple buildings, if
    the majority of the square footage is cross dock, choose Yes
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!136
- path: Strategy_at_Entry
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The strategy/ business case for purchasing the asset at time of purchase.
    See below for valid strategies at time of entry descriptions:

    -Conversion: Intent was to change the asset from one property/ asset type to another
    property/ asset type

    -Development: Intent was to develop a new asset

    -Lease-up: Intent was to substantially improve the leasing percentage of an operating
    asset

    -Redevelopment: Intent was to redevelop an asset via substantial expansion or
    re-tenanting, rehabilitation, or remodeling

    -Stabilized: Intent was to acquire a stabilized operating asset'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!137
- path: Entry_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The date that the original asset investment was made by the fund (enter
    the first acquisition date if there were multiple acquisitions)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!138
- path: Gross_Purchase_Price
  range: Double
  is_reference: false
  cardinality: optional
  definition: The gross purchase price paid for an asset before inclusion of purchase
    costs and expenses
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!139
- path: Net_Purchase_Price
  range: Double
  is_reference: false
  cardinality: optional
  definition: The gross purchase price net of any purchasing costs and expenses, and
    before debt
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!140
- path: Initial_Equity_Balance
  range: Double
  is_reference: false
  cardinality: optional
  definition: The asset's purchase price, less initial debt balance
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!141
- path: Exit_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The date that the asset was fully realized by the fund (sold or exited,
    enter the final disposition date if there were multiple dispositions)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!142
- path: Gross_Sales_Price
  range: Double
  is_reference: false
  cardinality: optional
  definition: The gross sales price received for an asset before deduction of sales
    costs and expenses
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!143
- path: Net_Sales_Price
  range: Double
  is_reference: false
  cardinality: optional
  definition: The gross sales price net of any selling costs and expenses, and before
    debt
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!144
- path: Effective_Ownership_Share_Economic_Share
  range: Double
  is_reference: false
  cardinality: optional
  definition: The ownership of the fund's interest in a particular investment based
    on the current period hypothetical liquidation (i.e., waterfall) calculation.
    At different points in the life of the investment, the economic share may differ
    from the contract share for the investment
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!145
- path: Committed_Capital
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cumulative asset paid-in capital plus unfunded commitments from
    all owners (e.g., budgeted construction costs or capital expenditure reserves)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!146
- path: Paid-in_Capital
  range: Double
  is_reference: false
  cardinality: optional
  definition: The paid-in capital is the cumulative drawdown amount, or the aggregate
    amount of committed capital actually transferred to the asset by the fund
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!147
- path: Total_Distributions
  range: Double
  is_reference: false
  cardinality: optional
  definition: The aggregate asset distributions paid since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!148
- path: Net_Asset_Value_Unrealized_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The fair value of real estate and all other assets less total liabilities.
    This is the amount reported in the GAAP fair value-based financial statements.
    Assets owned as joint ventures should be reported at the fund's economic ownership
    share
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!149
- path: Asset_Unleveraged_Property_Level_Total_Return_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The asset level return on a time-weighted basis reflects the performance
    of an operating asset or a group of assets. It relates strictly to asset operations
    and attempts to strip out all structure-related activity, usually including advisory
    fees, use of working capital, and owner income and expenses. It should be reported
    on an unleveraged basis
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!150
- path: Asset_Unleveraged_Property_Level_Total_Return_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: The asset level return on a time-weighted basis reflects the performance
    of an operating asset or a group of assets. It relates strictly to asset operations
    and attempts to strip out all structure-related activity, usually including advisory
    fees, use of working capital, and owner income and expenses. It should be reported
    on an unleveraged basis
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!151
- path: Leveraged_Gross_IRR_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: The since inception internal rate of return for the investment before
    fund fees and costs (e.g., advisory fees, use of working capital, and/ or owner
    income and expenses)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!152
- path: Gross_Total_Value_to_Paid-in_Capital_Multiple_TVPI_Since_Inception
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the total distributions since inception divided by the total
    paid in capital since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!153
- path: Gross_Market_Value_Fair_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: As defined under ASC 820, fair value is "the price that would be received
    to sell an asset or paid to transfer a liability in an orderly transaction between
    market participants at the measurement date"
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!154
- path: Gross_Cost_Basis
  range: Double
  is_reference: false
  cardinality: optional
  definition: The initial cost basis of the asset (including direct costs of acquiring
    the asset) plus any additional capital costs (including capitalized development
    costs, if applicable) minus any capital receipts (if applicable)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!155
- path: Capital_Expenditures_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total of all expenditures that are capitalized to the property (as
    opposed to expensed) in accordance with the policy of the fund or investment.
    If tenant improvements and/ or leasing commissions are capitalized, these should
    be included
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!156
- path: Net_Operating_Income_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The net operating income (NOI) reported should be consistent with the
    results of the asset's operations. Most classifications of income and expense
    and ground rent used to account for an asset's operations are universal (e.g.,
    rental income, property tax expense, etc.). Where alternative accounting treatments
    exist, reporting should be consistent with the accounting practices of your fund
    (upon which the audit report is based)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!157
- path: Contract_Rent_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total contract rent under existing leases for the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!158
- path: Market_Rent_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total market rent under existing leases for the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!159
- path: Appraisal_Valuation_Type
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The type of appraisal performed on the asset during the reporting period.
    See below list for valid entries:

    -External

    -Internal

    -None'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!160
- path: Appraisal_Valuation_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The date associated with the valuation data submitted
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!161
- path: Contract_Rent_Next_12_Months
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total contract rent under existing leases for year one of the DCF
    analysis (only total annual amounts should be provided - do not reduce the time
    period nor provide adjusted amounts)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!162
- path: Market_Rent_Next_12_Months
  range: Double
  is_reference: false
  cardinality: optional
  definition: The total market rent under existing leases for year one of the DCF
    analysis (only total annual amounts should be provided - do not reduce the time
    period nor provide adjusted amounts)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!163
- path: Going-in_Cap_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cap rate that, if applied to the estimated first-year NOI for the
    asset (based on actual occupancy, contract rents, etc.), results in the estimated
    gross market value (fair value) for the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!164
- path: Discount_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The rate used to discount all cash flows to calculate the gross market
    value (fair value) for the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!165
- path: Terminal_Cap_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cap rate that, if applied to the NOI one year after the sale of
    the asset, results in the projected resale price for the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!166
- path: Stabilized_Cap_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The cap rate that if applied to a "stabilized" first year NOI results
    in an estimate of the "stabilized" market value
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!167
- path: Three_Year_Average_Rent_Growth
  range: Double
  is_reference: false
  cardinality: optional
  definition: The average annual compound rate of growth projected for market rents
    over the next 3 years
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!168
- path: Ten_Year_Average_Rent_Growth
  range: Double
  is_reference: false
  cardinality: optional
  definition: The average annual compound rate of growth projected for market rents
    over the next 10 years
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!169
- path: Net_Initial_Yield
  range: Double
  is_reference: false
  cardinality: optional
  definition: The current passing rent of the asset (net of operating costs, recoverable
    and non recoverable) over the gross market value (including notional acquisition
    costs)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!170
- path: Reversionary_Potential
  range: Double
  is_reference: false
  cardinality: optional
  definition: The estimated rental value as a percentage of gross market value
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!171
- path: Lifecycle
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The current lifecycle stage for the asset. See below for valid lifecycle
    type descriptions:

    -Conversion: Changing from one property/ asset type to another property/ asset
    type

    -Development: Beginning of site and improvement construction through completion

    -Initial Leasing: Completed construction and <60% occupied and < 1 year of operations

    -Operating: Completed construction with >= 60% occupied status or >= 1 year of
    operations

    -Pre-Development: In preparation of development (obtaining titles and rights)
    up to beginning of site and improvement construction

    -Redevelopment: Undergoing substantial expansion or re-tenanting, rehabilitation,
    or remodeling

    -Sold: Asset has been fully realized'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!172
- path: Percent_Leased
  range: Double
  is_reference: false
  cardinality: optional
  definition: The percentage of the asset's net rentable square footage/ meters that
    is under lease obligation at quarter-end. ‘Under lease obligation’ means a lease
    has been executed on the space, it does not require that the lease has begun.
    It is not relevant whether the space is occupied or unoccupied, or whether the
    tenant is or is not paying rent at the time, only if the area is leased
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!173
- path: Lease_Roll_Next_12_Months
  range: Double
  is_reference: false
  cardinality: optional
  definition: The percentage of leases expiring over the next 12 months, weighted
    by the contract rent
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!174
- path: Weighted_Average_Lease_Term_Years
  range: Double
  is_reference: false
  cardinality: optional
  definition: The weighted average remaining contract lease term for all of the asset's
    tenants. Contract rent should be used as the weighting factor in calculating the
    weighted average
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!175
- path: Weighted_Average_Lease_to_Break_Years
  range: Double
  is_reference: false
  cardinality: optional
  definition: The weighted average remaining contract lease term for all of the asset's
    tenants based on contract rent to the first tenant break
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!176
- path: Projected_Delivery_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The anticipated date on which tenants will begin occupying the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!177
- path: Projected_Stabilized_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The anticipated date on which the asset will reach stabilization
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!178
- path: Projected_Gross_Market_Value_Fair_Value_at_Stabilization
  range: Double
  is_reference: false
  cardinality: optional
  definition: The estimated gross market value (fair value) of the asset at the projected
    stabilized date
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!179
- path: Projected_Gross_Cost_Basis_at_Stabilization
  range: Double
  is_reference: false
  cardinality: optional
  definition: The initial cost basis of the asset (including direct costs of acquiring
    the asset) plus any additional capital costs (including capitalized development
    costs, if applicable) minus any capital receipts (if applicable) at the projected
    stabilized date
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!180
- path: Projected_Exit_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The anticipated date on which the asset will be fully realized (sold
    or exited) by the fund
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!181
- path: Projected_Gross_Sales_Price_at_Exit
  range: Double
  is_reference: false
  cardinality: optional
  definition: The gross sales price received for an asset before deduction of sales
    costs and expenses at the projected exit date
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!182
- path: Projected_Leveraged_Gross_IRR_After_Realization
  range: Double
  is_reference: false
  cardinality: optional
  definition: The anticipated (after full realization) internal rate of return for
    the investment before fund fees and costs (e.g., advisory fees, use of working
    capital, and/ or owner income and expenses)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!183
- path: Projected_Gross_Total_Value_to_Paid-in_Capital_Multiple_TVPI_After_Realization
  range: Double
  is_reference: false
  cardinality: optional
  definition: Equal to the sum of the actual and projected total distributions since
    inception divided by the actual and projected total paid in capital since inception
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!184
- path: Lender
  range: String
  is_reference: false
  cardinality: optional
  definition: The name of the firm originating the loan (if syndicated, use the name
    of the lead arranger)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!185
- path: Debt_Payable_Loan_Type
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The type of interest rate associated with the loan. See below list
    for valid entries:

    -Fixed - No Hedging

    -Fixed - IR Swap

    -Fixed - IR Cap

    -Floating - No Hedging

    -Floating - IR Swap

    -Floating - IR Cap

    -Floating - IR Floor

    -Floating - IR Collar (Cap & Floor)'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!186
- path: Debt_Payable_Paydown
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The type of paydown for the debt payable. See below list for valid
    entries:

    -Amortization

    -Interest Only'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!187
- path: Debt_Payable_Loan_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: If fixed rate, provide the rate. If floating rate, provide the reference
    rate + margin (exclude any impact from hedging)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!188
- path: Debt_Payable_Interest_Rate
  range: Double
  is_reference: false
  cardinality: optional
  definition: The actual interest rate for the period (including any impact from hedging)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!189
- path: Debt_Payable_Origination_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The date of the loan origination
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!190
- path: Debt_Payable_Maturity_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: Maturity date of loan excluding elective extensions
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!191
- path: Debt_Payable_Fully_Extended_Maturity_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: Maturity date of loan including all available/ elective extensions.
    Enter the maturity date if extension data is unknown
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!192
- path: Debt_Payable_Fully_Extended_Derivative_Maturity_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: The maturity date for the related derivative (Cap, Swap, etc.), including
    any elective extensions
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!193
- path: Debt_Payable_Book_Value_Principal_Balance_Outstanding
  range: Double
  is_reference: false
  cardinality: optional
  definition: The outstanding principal balance at the end of the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!194
- path: Debt_Payable_Market_Value_Fair_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: Market value (fair value) of the outstanding principal balance at the
    end of the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!195
- path: Debt_Payable_Principal_Payment_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The regular (scheduled) loan principal amortization payments as paid
    in accordance with the loan documents during the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!196
- path: Debt_Payable_Interest_Expense_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The accrual basis interest expense for the reporting period (rather
    than interest paid)
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!197
- path: Debt_Payable_Debt_Service_Paid_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The accrual basis interest expense plus scheduled principal payments
    for the quarter
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!198
- path: Asset_ID
  range: String
  is_reference: false
  cardinality: optional
  definition: The unique ID used by the sponsor/ general partner to identify the asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!199
- path: Asset_Name
  range: String
  is_reference: false
  cardinality: optional
  definition: The name of the asset used by the sponsor/ general partner
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!200
- path: Is_New_Asset
  range: Boolean
  is_reference: false
  cardinality: optional
  definition: Is the asset new to the fund this reporting period?
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!201
- path: Reporting_Currency
  range: List
  is_reference: false
  cardinality: optional
  definition: The reporting currency for the fund/ asset
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!202
- path: Investment_Structure
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The investment structure of the asset. See below for valid investment
    structure descriptions:

    -Wholly-owned Asset - Equity or equity-oriented investment in an asset that is
    100% owned by the fund

    -Joint Venture Asset - Equity or equity-oriented investment in an asset held in
    a JV partner structure

    -Forward Commitment - Investment in a binding agreement to carry out a specific
    transaction at a specified future date

    -Private Fund Equity - Investment in a private fund

    -Private Company Equity - Investment in a private operating company

    -Public Equity - Investment that is a publicly-traded equity security (i.e., publicly-traded
    stock)

    -Preferred Equity - Equity investment in a property/ asset-owning entity. It is
    generally subordinate to mortgage loans and any mezzanine loans, but is senior
    to common equity

    -Mezzanine Debt - Investment in the capital structure layer of funding between
    common equity and secured borrowing, usually subordinated and sometimes may carry
    an equity warrant

    -Senior Debt - Investment in the first ranking portion of a real estate loan.
    A loan that ranks higher (in terms of repayment and enforcement of security) than
    other loans to the same borrower or borrower group

    -Whole Loan - Investment in a single, first-ranking loan which covers both the
    senior debt and mezzanine tranches in the capital structure

    -Levered Loan - Investment in a loan rated below investment grade level, and for
    loans to non-rated companies that have higher interest rates than typical loan
    interest rates

    -Private Fund Debt - Loan investment to a private fund

    -Private Company Debt - Loan investment to a private operating company

    -Public Debt - Loan investment to a publicly-traded company which doesn''t have
    any equity participation, CMBS, RMBS, or other public debt investment'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!203
- path: Property_Asset_Type
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The property/ asset type for the asset. See property/ asset subtype
    for the full list of descriptions supporting the below property/ asset types:

    -Industrial

    -Office

    -Residential

    -Retail

    -Hotel

    -Senior Housing

    -Data Center

    -Self Storage

    -Land

    -Other Real Estate

    -Real Assets

    -Infrastructure'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!204
- path: Property_Asset_Subtype
  range: List
  is_reference: false
  cardinality: optional
  definition: 'The property/ asset subtype for the asset. See below for valid property/
    asset subtype descriptions:

    -Industrial - Manufacturing: An industrial facility specifically designed for
    the conversion, fabrication, and/or assembly of raw or partly wrought materials
    into products/goods

    -Industrial - Warehouse: An industrial facility primarily designed for the storage
    and/or distribution of materials, goods, and merchandise

    -Industrial - Flex/R&D: An industrial facility designed to allow for flexibility
    of alternative uses of the space. Buildings typically feature 25-100% office finishes
    and high curb appeal and parking ratios

    -Industrial - Cold Storage: A specialized type of warehouse with freezer/cooler
    space that encompasses the majority of the warehouse space

    -Industrial - Life Science: An industrial facility specifically designed with
    base building infrastructure to support usage as a lab

    -Industrial - Specialized: Industrial facilities that accommodate specific uses
    not described in other subtypes. Examples include facilities designed for efficient
    transfer of goods between trucks or via airplanes, and industrial assets that
    do not fit stated classifications within the property type

    -Industrial - Other: Other industrial facilities not listed above

    -Office - CBD: Serves as the commercial and business center of a city, typified
    by a concentration of retail and office. This area contains office density of
    2 to 8 million square feet per mile and has at least 20% of its total square footage
    comprised of office space. Includes only office buildings not otherwise designated
    as Medical or Life Science

    -Office - Urban: Geographic area with high population and/or commercial density
    but not reaching the office concentration of a CBD. This area contains total commercial
    and residential density of 6 to 11 million square feet per mile. Includes only
    office buildings not otherwise designated as Medical or Life Science

    -Office - Secondary Business District: Serves as a business center in a suburban
    location. This area contains office density greater than 0.5 million square feet
    per mile and has at least 20% of its total square footage comprised of office
    space. Includes only office buildings not otherwise designated as Medical or Life
    Science

    -Office - Suburban: A lower density residential and/or mixed-use area that does
    not meet the criteria for CBD, Urban and Secondary Business Districts. Includes
    only office buildings not otherwise designated as Medical or Life Science

    -Office - Medical Office: Office buildings in which 90% or more of the occupied
    space is leased to medical tenants. Medical tenants are defined as tenants whose
    primary business activity in the space is delivery of medical care to patients

    -Office - Life Science: An office building specifically designed with base building
    infrastructure to support usage as a lab. It further requires lab science lab
    improvements and or life science tenancy

    -Office - Other: Other office buildings not listed above

    -Residential - Apartment (Garden): Garden-style buildings are three stories or
    less, with multiple apartments per story, and landscaped grounds surrounding them.
    In most instances, buildings are arranged with interior courtyards open at one
    end, and car parking either in front of the buildings or along the perimeter

    -Residential - Apartment (Low-Rise): For-rent, multi-unit residential buildings
    not classified as Garden, and 1-4 floors

    -Residential - Apartment (Mid-Rise): For-rent, multi-unit residential buildings
    not classified as Garden, and 5-10 floors

    -Residential - Apartment (High-Rise): For-rent, multi-unit residential buildings
    not classified as Garden, and more than 10 floors

    -Residential - Student Housing: For-rent residential buildings positioned by location,
    lease structure, and amenities to appeal to student residents

    -Residential - Manufactured Housing: Pre-manufactured housing complexes, including
    mobile home facilities. Manufactured Housing is inclusive of both park-owned communities
    (where the landlord owns the units) and resident-owned communities (where the
    residents own the units and rent the pad-site from the park owner)

    -Residential - Single-Family Rental: These are build-for-rent communities providing
    a cohesive offering of single-family homes, with on-site management and maintenance.
    At a minimum, these should be reported at the zip code level (i.e., portfolio
    investments should be broken-out to the underlying zip codes in the "Portfolio
    Assets" tab)

    -Residential - For Sale Residential: For-sale residential buildings

    -Residential - Other: Other residential buildings not listed above

    -Retail - Mall: A retail center that provides a variety of goods comparable to
    those of a central business district, including general merchandise, apparel,
    and home furnishings, as well as a variety of services and recreational facilities.
    Typically, but not always, enclosed with inward facing stores connected by a common
    walkway and is over 400,000 SF in size

    -Retail - Street: Storefront retail that is typically located in the lower floors
    of, or adjacent to an office or multi-family building. Building typically has
    no setback or very limited setback from the street and generally has access to
    heavy pedestrian and vehicle traffic. This subtype should also include standalone
    retail buildings

    -Retail - Strip: An anchored or unanchored open-air shopping center that typically
    consists of an aggregation of in-line stores with a common parking area. Stores
    are entered individually from the parking lot through outside entrances. The center
    usually ranges in size from 30,000 to 400,000 SF but can be smaller or larger
    in some instances

    -Retail - Other: Other retail buildings not listed above

    -Hotel - Full Service: Full service hotels are generally hotels with meeting space,
    a restaurant, and lounge facilities, as well as minimum service levels often including
    bell service and room service. Luxury, upper upscale, upscale, upper midscale,
    and independent hotels with food and beverage should be included here

    -Hotel - Limited Service: Limited service hotels have rooms-only operations (i.e.,
    without food and beverage service) or offer a bedroom and bathroom for the night,
    but very few other services and amenities. Midscale, economy, and independent
    hotels without food and beverage should be included here

    -Hotel - Other: Other hotel buildings not listed above

    -Senior Housing - Independent Living: Properties where independent living units
    comprise the largest share of inventory in a seniors housing property. Independent
    living properties typically include services such as communal dining, housekeeping,
    transportation, emergency call, and social programming services in the monthly
    fee

    -Senior Housing - Assisted Living: Properties where assisted living units and/or
    memory care units comprise the largest share of inventory in a seniors housing
    property. Residents receive personal care services such as assistance with bathing,
    dressing, eating, walking, and toileting. 24-hour protective oversight is provided,
    but 24-hour medical care is not

    -Senior Housing - Continuing Care Retirement Community: Continuing care retirement
    communities provide a spectrum of care to allow aging in place and must include
    independent units and nursing care beds and often include assisted living and
    memory care beds as well. These properties may charge an entrance fee

    -Senior Housing - Skilled Nursing: Properties where nursing care beds comprise
    the largest share of inventory. It is generally a licensed long-term health care
    and residential property that serves persons who require constant medical supervision
    and/or who require significant physical assistance in transferring, management
    of continence, and use of medical devices

    -Senior Housing - Other: Other senior housing buildings not listed above

    -Data Center: A building designed for the operation of data servers and related
    network equipment. Buildings feature a high and redundant power supply, and have
    significant cooling capacity and fiber optic connectivity. Lease rates may often
    be designated in megawatts, rather than square footage

    -Self Storage: Note that these properties are distinguishable from Industrial-Warehouse
    in that individual Self-Storage units are smaller (typically 10x30 or less) and
    have much shorter lease terms (typically 30 days)

    -Land: Note that Land parcels that are income producing should be classified as
    Operating Land under the Other Property Type

    -Other Real Estate - Diversified: An entity investment (e.g., REIT, operating
    company, fund) where the entity is able to invest in multiple property/ asset
    types

    -Other Real Estate - Entertainment/Leisure: Properties such as theaters, golf
    courses, and ski resorts

    -Other Real Estate - Gaming: Properties such as casinos, racetracks, etc.

    -Other Real Estate - Healthcare: Medical facilities not classified as medical
    office or senior housing (e.g., hospitals)

    -Other Real Estate - Operating Land: Generally, assets that qualify will be land
    with a ground lease and asset owned is the underlying land, but not of the building
    on the land. It can also include situations where there is no structure on the
    land, but it is income generating for other reason. It should exclude land leased
    for other real assets (e.g., agriculture)

    -Other Real Estate - Parking: Income-producing parking lots or structures. Income
    is generated from term parking agreements (e.g., hourly, daily, weekly, monthly).
    Unimproved properties used only for the storage of vehicles should not be classified
    as parking but should be considered operating land

    -Other Real Estate - Production Studio: Properties where the substantial use of
    which is production studios, stages, control rooms and /or other audio and video
    room space, office and other support space, storage facilities and other incidental
    uses related thereto

    -Other Real Estate - Other: Any other real estate property not listed above

    -Real Assets - Agriculture/Farmland

    -Real Assets - Leasing

    -Real Assets - Mining & Resources

    -Real Assets - Timberland

    -Real Assets - Other Real Assets

    -Infrastructure - Energy & Power

    -Infrastructure - Utilities

    -Infrastructure - Renewables

    -Infrastructure - Social

    -Infrastructure - Telecommunications

    -Infrastructure - Transport

    -Infrastructure - Diversified

    -Infrastructure - Other Infrastructure'
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!205
- path: Street_Address
  range: String
  is_reference: false
  cardinality: optional
  definition: The full street address of the asset. If the asset spans multiple street
    addresses (e.g., an industrial park), enter the street address of the largest
