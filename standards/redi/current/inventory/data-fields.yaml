  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!227
- path: Loan_Investment_Fully_Extended_Maturity_Date_Exit_Date
  range: Date
  is_reference: false
  cardinality: optional
  definition: Fully extended maturity date, regardless of whether exercised or not.
    Enter the maturity date if extension data is unknown
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!228
- path: Loan_Investment_Book_Value_Principal_Balance_Outstanding
  range: Double
  is_reference: false
  cardinality: optional
  definition: The outstanding principal balance at the end of the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!229
- path: Loan_Investment_Market_Value_Fair_Value
  range: Double
  is_reference: false
  cardinality: optional
  definition: The market value (fair value) of the outstanding principal balance at
    the end of the reporting period
  source_location: REDI Data Model 1.0.xlsx!REDI Data Fields!230
- path: Loan_Investment_Principal_Receipt_Qtr
  range: Double
  is_reference: false
  cardinality: optional
  definition: The regular (scheduled) loan principal amortization receipts as received
